name: Update Bank of Israel rates

on:
  schedule:
    - cron: "0 6,15 * * *"   # дважды в сутки (UTC)
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Fetch Bank of Israel rates
        run: node scripts/fetch-boi.js

      - name: Commit updated rates
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add boi-rates.json
          git diff --staged --quiet || git commit -m "Update Bank of Israel rates [skip ci]"
          git push
