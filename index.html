<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Конвертер валют — курсы Банка Израиля и ЕЦБ</title>
<meta name="theme-color" content="#0f172a">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Валюты">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<link rel="icon" type="image/png" href="icon-192.png">
<link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="app">
    <header>
      <div class="lang-switch">
        <button class="lang-btn" data-lang="ru">RU</button>
        <button class="lang-btn" data-lang="en">EN</button>
        <button class="lang-btn" data-lang="he">עב</button>
      </div>
      <h1 id="title">💱 Конвертер валют</h1>
      <p class="subtitle" id="subtitle">Точные курсы Банка Израиля (BOI) и Европейского центрального банка (ЕЦБ)</p>
    </header>

    <button id="installBtn" class="install-btn hidden">📲 Скачать на телефон</button>

    <div id="installHelp" class="ios-help hidden">
      <div id="installHelpText"></div>
      <button id="helpClose" class="install-btn">Понятно</button>
    </div>

    <div class="source-switch">
      <button class="src-btn active" data-source="ecb">🇪🇺 ЕЦБ / банки Европы</button>
      <button class="src-btn" data-source="boi">🇮🇱 Банк Израиля</button>
    </div>

    <main class="converter">
      <div class="row">
        <div class="amount-wrap">
          <input type="number" id="amount" value="100" min="0" step="any" inputmode="decimal">
          <button id="clearAmount" class="clear-amount" aria-label="Очистить">×</button>
        </div>
        <select id="from"></select>
      </div>

      <button id="swap" title="Поменять местами" aria-label="Поменять валюты">⇅</button>

      <div class="row">
        <input type="text" id="result" value="" readonly inputmode="decimal">
        <select id="to"></select>
      </div>

      <div class="rate-line" id="rateLine">—</div>
    </main>

    <section class="watch">
      <div class="watch-head">
        <h2 id="myCurTitle">Мои валюты</h2>
      </div>
      <div class="watch-add">
        <input type="text" id="curSearch" placeholder="Поиск валюты…" autocomplete="off">
        <div id="curResults" class="cur-results hidden"></div>
      </div>
      <div class="quick" id="quick"></div>
    </section>

    <footer>
      <div id="status" class="status">Загрузка курсов…</div>
      <div class="meta">
        <span id="updated"></span>
        <button id="refresh">Обновить курсы</button>
      </div>
      <p class="disclaimer">
        <span id="disclaimer">Курсы носят справочный характер.</span>
        <br><span id="ver" class="ver"></span>
      </p>
    </footer>
  </div>

  <script src="i18n.js"></script>
  <script src="rates.js"></script>
  <script src="app.js"></script>
</body>
</html>
